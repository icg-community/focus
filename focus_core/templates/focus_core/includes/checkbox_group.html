<fieldset class="field-group checkbox-group" aria-describedby="{{ field.html_name }}-help{% if field.errors %} {{ field.html_name }}-error{% endif %}">
    <legend>
        {{ field.label }}{% if field.field.required %} <span aria-hidden="true">*</span>{% endif %}
    </legend>
    {{ field }}
    {% if field.help_text %}
        <p id="{{ field.html_name }}-help" class="field-help">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
        <ul id="{{ field.html_name }}-error" class="field-errors">
            {% for error in field.errors %}
                <li>Error: {{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</fieldset>
