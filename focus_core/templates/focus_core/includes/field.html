<div class="field-group">
    <label for="{{ field.id_for_label }}">
        {{ field.label }}{% if field.field.required %} <span aria-hidden="true">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p id="{{ field.name }}-help" class="field-help">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
        <ul id="{{ field.name }}-error" class="field-errors">
            {% for error in field.errors %}
                <li>Error: {{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
